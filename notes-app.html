<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --surface3: #1e2d45;
      --border: #1e3a5f;
      --border2: #2a4a7f;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --accent3: #7c3aed;
      --neon: #00ff88;
      --text: #e2f0ff;
      --text2: #7a9cc0;
      --danger: #ff4757;
      --warning: #ffa502;
      --success: #00ff88;
      --radius: 12px;
      --glow: 0 0 20px rgba(0,212,255,0.3);
      --glow2: 0 0 20px rgba(255,107,53,0.3);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    #auth-screen {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: 
        radial-gradient(ellipse at 10% 50%, rgba(0,212,255,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 50%, rgba(124,58,237,0.08) 0%, transparent 50%),
        var(--bg);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 0 60px rgba(0,212,255,0.1), 0 20px 60px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent3), var(--accent), var(--neon));
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo .icon-wrap {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 28px;
      box-shadow: 0 0 30px rgba(0,212,255,0.4);
    }

    .auth-logo h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .auth-logo h1 span { color: var(--accent); }
    .auth-logo p { font-size: 13px; color: var(--text2); margin-top: 6px; }

    .tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1; padding: 9px;
      text-align: center;
      font-size: 13px; font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
      color: var(--text2);
      border: none; background: transparent;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      color: #fff;
      box-shadow: 0 0 15px rgba(0,212,255,0.3);
    }

    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 11px; font-weight: 600;
      color: var(--accent);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; color: var(--text2);
    }

    input, textarea, select {
      width: 100%;
      padding: 11px 12px 11px 38px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }

    textarea { padding-left: 14px; resize: vertical; min-height: 110px; }
    select { padding-left: 14px; }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      background: var(--surface3);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1), var(--glow);
    }

    .btn {
      display: inline-flex; align-items: center;
      justify-content: center; gap: 7px;
      padding: 11px 18px;
      font-size: 14px; font-weight: 600;
      border-radius: 10px; border: none;
      cursor: pointer; transition: all 0.2s;
      font-family: inherit; letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      color: #fff; width: 100%;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }
    .btn-primary:hover { box-shadow: 0 0 30px rgba(0,212,255,0.5); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }

    .btn-danger {
      background: rgba(255,71,87,0.1);
      color: var(--danger);
      border: 1px solid rgba(255,71,87,0.2);
    }
    .btn-danger:hover { background: rgba(255,71,87,0.2); box-shadow: 0 0 15px rgba(255,71,87,0.2); }
    .btn-sm { padding: 6px 10px; font-size: 12px; border-radius: 8px; }

    /* NEW: empty-state button styles */
    .empty-state-btn {
      padding: 14px 32px !important;
      font-size: 16px !important;
      border-radius: 12px !important;
      min-width: 180px;
    }

    .alert {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 1rem;
    }
    .alert-error { background: rgba(255,71,87,0.1); color: var(--danger); border: 1px solid rgba(255,71,87,0.2); }
    .alert-success { background: rgba(0,255,136,0.1); color: var(--neon); border: 1px solid rgba(0,255,136,0.2); }
    .hidden { display: none !important; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #app-screen { width: 100%; display: flex; height: 100vh; overflow: hidden; }

    .sidebar {
      width: 260px; min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 1.25rem;
      position: relative;
    }

    .sidebar::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .sidebar-logo {
      display: flex; align-items: center; gap: 12px;
      padding: 0.5rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }

    .sidebar-logo .icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 15px rgba(0,212,255,0.3);
    }

    .sidebar-logo span { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .sidebar-logo span em { color: var(--accent); font-style: normal; }

    .nav-section { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; padding: 0 4px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--text2); transition: all 0.2s;
      margin-bottom: 2px; border: none;
      background: transparent; width: 100%; text-align: left;
      position: relative;
    }

    .nav-item:hover { background: var(--surface2); color: var(--text); }

    .nav-item.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(0,212,255,0.1));
      color: var(--accent);
      border: 1px solid rgba(0,212,255,0.2);
      box-shadow: 0 0 15px rgba(0,212,255,0.05);
    }

    .nav-item i { font-size: 18px; }

    .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--border); padding-top: 1rem; }

    .user-info {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
      box-shadow: 0 0 12px rgba(255,107,53,0.4);
    }

    .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: relative;
    }

    .topbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .topbar h2 {
      font-size: 18px; font-weight: 700; flex: 1;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .search-wrap { position: relative; flex: 1; max-width: 300px; }
    .search-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 16px; }
    .search-wrap input { padding: 9px 12px 9px 34px; font-size: 13px; border-radius: 10px; }

    .content { flex: 1; overflow-y: auto; padding: 1.5rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem; margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      position: relative; overflow: hidden;
      transition: all 0.2s;
    }

    .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }

    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }

    .stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent3), var(--accent)); }
    .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--neon), var(--accent)); }
    .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--warning), var(--accent2)); }
    .stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--accent2), var(--danger)); }

    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 12px;
    }

    .stat-value { font-size: 28px; font-weight: 800; }
    .stat-label { font-size: 12px; color: var(--text2); margin-top: 3px; font-weight: 500; }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      cursor: pointer; transition: all 0.2s;
      position: relative; overflow: hidden;
    }

    .note-card::before {
      content: '';
      position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--accent3));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .note-card:hover {
      border-color: var(--border2);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(0,212,255,0.05);
    }

    .note-card:hover::before { opacity: 1; }

    .note-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 8px;
    }

    .note-title { font-size: 15px; font-weight: 700; flex: 1; margin-right: 8px; color: var(--text); }
    .note-content { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .note-footer { display: flex; align-items: center; justify-content: space-between; }

    .note-category {
      font-size: 11px; padding: 3px 10px;
      border-radius: 20px; font-weight: 600;
      background: rgba(0,212,255,0.1);
      color: var(--accent);
      border: 1px solid rgba(0,212,255,0.2);
    }

    .note-date { font-size: 11px; color: var(--text2); }
    .note-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }

    .tag {
      font-size: 11px; padding: 2px 8px; border-radius: 5px;
      background: rgba(124,58,237,0.15);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.2);
      font-weight: 500;
    }

    .note-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
    .note-card:hover .note-actions { opacity: 1; }

    .archived-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 5px;
      background: rgba(255,165,2,0.1); color: var(--warning);
      border: 1px solid rgba(255,165,2,0.2); margin-left: 6px; font-weight: 600;
    }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 1rem;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 0 60px rgba(0,212,255,0.1), 0 20px 60px rgba(0,0,0,0.6);
      position: relative;
    }

    .modal::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent3), var(--accent), var(--neon));
      border-radius: 20px 20px 0 0;
    }

    .modal-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 1.5rem;
    }

    .modal-header h3 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-state i { font-size: 56px; color: var(--border2); margin-bottom: 1rem; display: block; }
    .empty-state h3 { font-size: 20px; margin-bottom: 8px; font-weight: 700; }
    .empty-state p { color: var(--text2); font-size: 14px; margin-bottom: 1.5rem; }

    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .analytics-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      position: relative; overflow: hidden;
    }

    .analytics-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent3), var(--accent));
    }

    .analytics-card h4 {
      font-size: 12px; font-weight: 700; margin-bottom: 1.25rem;
      color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
      display: flex; align-items: center; gap: 6px;
    }

    .bar-item { margin-bottom: 12px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; font-weight: 500; }
    .bar-label span:last-child { color: var(--accent); font-weight: 700; }
    .bar-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
    .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent3), var(--accent)); box-shadow: 0 0 10px rgba(0,212,255,0.3); transition: width 0.6s ease; }

    .month-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border);
      font-size: 14px; font-weight: 500;
    }
    .month-item:last-child { border-bottom: none; }
    .month-count {
      font-weight: 700; color: var(--accent);
      background: rgba(0,212,255,0.1);
      padding: 3px 10px; border-radius: 20px;
      border: 1px solid rgba(0,212,255,0.2);
      font-size: 12px;
    }

    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      padding: 12px 18px; border-radius: 12px;
      font-size: 13px; font-weight: 600; z-index: 999;
      animation: slideIn 0.3s ease;
      display: flex; align-items: center; gap: 8px;
      backdrop-filter: blur(10px);
    }

    .toast-success {
      background: rgba(0,255,136,0.1); color: var(--neon);
      border: 1px solid rgba(0,255,136,0.3);
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }

    .toast-error {
      background: rgba(255,71,87,0.1); color: var(--danger);
      border: 1px solid rgba(255,71,87,0.3);
      box-shadow: 0 0 20px rgba(255,71,87,0.2);
    }

    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; border-radius: 9px;
      background: var(--accent); color: #000;
      font-size: 10px; font-weight: 800; padding: 0 5px;
      margin-left: auto;
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon-wrap"><i class="ti ti-notebook" style="color:#fff"></i></div>
      <h1>Notes<span>AI</span></h1>
      <p>Your intelligent note-taking workspace</p>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Sign Up</button>
    </div>
    <div id="auth-alert" class="hidden"></div>
    <div id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="ti ti-mail"></i>
          <input type="email" id="login-email" placeholder="faizan@gmail.com" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="ti ti-lock"></i>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
      </div>
      <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">
        <i class="ti ti-login"></i> Sign In
      </button>
    </div>
    <div id="register-form" class="hidden">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="ti ti-user"></i>
          <input type="text" id="reg-username" placeholder="faizan" />
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="ti ti-mail"></i>
          <input type="email" id="reg-email" placeholder="faizan@gmail.com" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="ti ti-lock"></i>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
      </div>
      <button class="btn btn-primary" id="register-btn" onclick="handleRegister()">
        <i class="ti ti-user-plus"></i> Create Account
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="icon"><i class="ti ti-notebook" style="color:#fff; font-size:18px"></i></div>
      <span>Notes<em>AI</em></span>
    </div>
    <div class="nav-section">Workspace</div>
    <button class="nav-item active" id="nav-notes" onclick="showView('notes')">
      <i class="ti ti-notes"></i> All Notes
      <span class="badge" id="notes-count">0</span>
    </button>
    <button class="nav-item" id="nav-archived" onclick="showView('archived')">
      <i class="ti ti-archive"></i> Archived
    </button>
    <div class="nav-section" style="margin-top:1rem">Discover</div>
    <button class="nav-item" id="nav-search" onclick="showView('search')">
      <i class="ti ti-search"></i> Search
    </button>
    <button class="nav-item" id="nav-analytics" onclick="showView('analytics')">
      <i class="ti ti-chart-bar"></i> Analytics
    </button>
    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="avatar" id="sidebar-avatar">FA</div>
        <div>
          <div class="user-name" id="sidebar-name">Faizan</div>
          <div class="user-email" id="sidebar-email">faizan@gmail.com</div>
        </div>
      </div>
      <button class="nav-item" onclick="handleLogout()">
        <i class="ti ti-logout"></i> Sign Out
      </button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="page-title">All Notes</h2>
      <div class="search-wrap hidden" id="search-bar">
        <i class="ti ti-search"></i>
        <input type="text" id="search-input" placeholder="Search notes..." oninput="handleSearch()" />
      </div>
      <button class="btn btn-primary btn-sm" id="new-note-btn" onclick="openNoteModal()">
        <i class="ti ti-plus"></i> New Note
      </button>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="note-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">New Note</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeNoteModal()"><i class="ti ti-x"></i></button>
    </div>
    <div id="modal-alert" class="hidden"></div>
    <div class="form-group">
      <label>Title</label>
      <div class="input-wrap">
        <i class="ti ti-heading"></i>
        <input type="text" id="note-title" placeholder="Give your note a title..." />
      </div>
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="note-content" placeholder="Start writing your thoughts..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="note-category">
          <option value="general">General</option>
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="ideas">Ideas</option>
          <option value="tasks">Tasks</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tags</label>
        <div class="input-wrap">
          <i class="ti ti-tag"></i>
          <input type="text" id="note-tags" placeholder="tag1, tag2, tag3" />
        </div>
      </div>
    </div>
    <div style="display:flex; gap:8px; margin-top:0.5rem;">
      <button class="btn btn-primary" id="save-note-btn" onclick="saveNote()" style="flex:1">
        <i class="ti ti-device-floppy"></i> Save Note
      </button>
      <button class="btn btn-ghost" onclick="closeNoteModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';
let token = localStorage.getItem('notes_token') || '';
let currentUser = null;
let currentView = 'notes';
let editingNoteId = null;
let allNotes = [];
const MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }; }

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="ti ti-${type === 'success' ? 'circle-check' : 'alert-circle'}"></i> ${msg}`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function showAuthAlert(msg, type) {
  const box = document.getElementById('auth-alert');
  box.className = `alert alert-${type}`;
  box.innerHTML = `<i class="ti ti-alert-circle"></i> ${msg}`;
  box.classList.remove('hidden');
}

function showModalAlert(msg, type) {
  const box = document.getElementById('modal-alert');
  box.className = `alert alert-${type}`;
  box.innerHTML = `<i class="ti ti-alert-circle"></i> ${msg}`;
  box.classList.remove('hidden');
}

function setLoading(btnId, loading, text) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<div class="spinner"></div> Please wait...' : text;
}

function formatDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('auth-alert').classList.add('hidden');
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showAuthAlert('Please fill in all fields.', 'error');
  setLoading('login-btn', true, '<i class="ti ti-login"></i> Sign In');
  try {
    const res = await fetch(`${API}/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    token = data.token; localStorage.setItem('notes_token', token);
    initApp(data.user);
  } catch(e) { showAuthAlert(e.message, 'error'); }
  finally { setLoading('login-btn', false, '<i class="ti ti-login"></i> Sign In'); }
}

async function handleRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) return showAuthAlert('Please fill in all fields.', 'error');
  setLoading('register-btn', true, '<i class="ti ti-user-plus"></i> Create Account');
  try {
    const res = await fetch(`${API}/auth/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, password }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    token = data.token; localStorage.setItem('notes_token', token);
    initApp(data.user);
  } catch(e) { showAuthAlert(e.message, 'error'); }
  finally { setLoading('register-btn', false, '<i class="ti ti-user-plus"></i> Create Account'); }
}

function handleLogout() {
  localStorage.removeItem('notes_token'); token = ''; currentUser = null;
  document.getElementById('app-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}

function initApp(user) {
  currentUser = user;
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  const name = user.username || '';
  document.getElementById('sidebar-avatar').textContent = name.substring(0,2).toUpperCase();
  document.getElementById('sidebar-name').textContent = name;
  document.getElementById('sidebar-email').textContent = user.email;
  showView('notes');
}

function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`nav-${view}`)?.classList.add('active');
  document.getElementById('search-bar').classList.toggle('hidden', view !== 'search');
  document.getElementById('new-note-btn').classList.toggle('hidden', view === 'analytics');
  const titles = { notes: 'All Notes', archived: 'Archived Notes', search: 'Search Notes', analytics: 'Analytics' };
  document.getElementById('page-title').textContent = titles[view];
  if (view === 'notes') loadNotes();
  else if (view === 'archived') loadArchived();
  else if (view === 'search') renderSearch();
  else if (view === 'analytics') loadAnalytics();
}

async function loadNotes() {
  const content = document.getElementById('main-content');
  content.innerHTML = '<div style="text-align:center;padding:4rem"><div class="spinner" style="margin:0 auto;border-top-color:var(--accent);width:32px;height:32px;border-width:3px"></div></div>';
  try {
    const res = await fetch(`${API}/notes`, { headers: authHeaders() });
    const data = await res.json();
    allNotes = data.notes || [];
    document.getElementById('notes-count').textContent = allNotes.length;
    renderNotesView(allNotes);
  } catch(e) {
    content.innerHTML = '<div class="empty-state"><i class="ti ti-wifi-off"></i><h3>Connection Error</h3><p>Make sure your server is running on port 5000</p></div>';
  }
}

function renderNotesView(notes) {
  const active = notes.filter(n => !n.isArchived);
  const archived = notes.filter(n => n.isArchived);
  document.getElementById('main-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(124,58,237,0.15);color:#a78bfa"><i class="ti ti-notes"></i></div>
        <div class="stat-value">${notes.length}</div><div class="stat-label">Total Notes</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(0,255,136,0.1);color:var(--neon)"><i class="ti ti-circle-check"></i></div>
        <div class="stat-value">${active.length}</div><div class="stat-label">Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(255,165,2,0.1);color:var(--warning)"><i class="ti ti-archive"></i></div>
        <div class="stat-value">${archived.length}</div><div class="stat-label">Archived</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(255,107,53,0.1);color:var(--accent2)"><i class="ti ti-tag"></i></div>
        <div class="stat-value">${[...new Set(notes.flatMap(n => n.tags))].length}</div><div class="stat-label">Unique Tags</div>
      </div>
    </div>
    ${notes.length === 0 ? `<div class="empty-state"><i class="ti ti-notes-off"></i><h3>No notes yet</h3><p>Create your first note to get started</p><button class="btn btn-primary empty-state-btn" onclick="openNoteModal()"><i class="ti ti-plus"></i> Create Note</button></div>` : `<div class="notes-grid">${notes.map(noteCard).join('')}</div>`}
  `;
}

function noteCard(note) {
  return `<div class="note-card" onclick="openEditModal('${note._id}')">
    <div class="note-card-header">
      <div class="note-title">${note.title}${note.isArchived ? '<span class="archived-badge">Archived</span>' : ''}</div>
      <div class="note-actions" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="toggleArchive('${note._id}')" title="${note.isArchived?'Unarchive':'Archive'}">
          <i class="ti ti-${note.isArchived?'archive-off':'archive'}"></i>
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteNote('${note._id}')" title="Delete">
          <i class="ti ti-trash"></i>
        </button>
      </div>
    </div>
    ${note.tags?.length ? `<div class="note-tags">${note.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>` : ''}
    <div class="note-content">${note.content}</div>
    <div class="note-footer">
      <span class="note-category">${note.category}</span>
      <span class="note-date">${formatDate(note.createdAt)}</span>
    </div>
  </div>`;
}

async function loadArchived() {
  const content = document.getElementById('main-content');
  content.innerHTML = '<div style="text-align:center;padding:4rem"><div class="spinner" style="margin:0 auto;border-top-color:var(--accent);width:32px;height:32px;border-width:3px"></div></div>';
  try {
    const res = await fetch(`${API}/notes`, { headers: authHeaders() });
    const data = await res.json();
    const archived = (data.notes||[]).filter(n => n.isArchived);
    content.innerHTML = archived.length === 0
      ? `<div class="empty-state"><i class="ti ti-archive"></i><h3>No archived notes</h3><p>Archived notes will appear here</p></div>`
      : `<div class="notes-grid">${archived.map(noteCard).join('')}</div>`;
  } catch(e) {}
}

function renderSearch() {
  document.getElementById('main-content').innerHTML = `
    <div style="margin-bottom:1.25rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span style="font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1px">Filter:</span>
      ${['all','general','work','personal','ideas','tasks'].map(c => `<button class="btn btn-ghost btn-sm" onclick="filterSearch('${c==='all'?'':c}')">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join('')}
    </div>
    <div id="search-results" class="notes-grid"></div>
  `;
  document.getElementById('search-input').value = '';
}

async function handleSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) { document.getElementById('search-results').innerHTML = ''; return; }
  try {
    const res = await fetch(`${API}/notes/search?q=${encodeURIComponent(q)}`, { headers: authHeaders() });
    const data = await res.json();
    const results = document.getElementById('search-results');
    results.innerHTML = data.notes?.length ? data.notes.map(noteCard).join('') : '<p style="color:var(--text2);font-size:14px;padding:1rem">No notes found for your search</p>';
  } catch(e) {}
}

async function filterSearch(category) {
  try {
    const url = category ? `${API}/notes/search?category=${category}` : `${API}/notes`;
    const res = await fetch(url, { headers: authHeaders() });
    const data = await res.json();
    const notes = data.notes || [];
    const results = document.getElementById('search-results');
    results.innerHTML = notes.length ? notes.map(noteCard).join('') : '<p style="color:var(--text2);font-size:14px;padding:1rem">No notes in this category</p>';
  } catch(e) {}
}

async function loadAnalytics() {
  const content = document.getElementById('main-content');
  content.innerHTML = '<div style="text-align:center;padding:4rem"><div class="spinner" style="margin:0 auto;border-top-color:var(--accent);width:32px;height:32px;border-width:3px"></div></div>';
  try {
    const [sumRes, catRes, monRes] = await Promise.all([
      fetch(`${API}/analytics/summary`, { headers: authHeaders() }),
      fetch(`${API}/analytics/notes-by-category`, { headers: authHeaders() }),
      fetch(`${API}/analytics/notes-by-month`, { headers: authHeaders() })
    ]);
    const [sum, cat, mon] = await Promise.all([sumRes.json(), catRes.json(), monRes.json()]);
    const maxCat = Math.max(...(cat.data?.map(d=>d.count)||[1]));
    content.innerHTML = `
      <div class="stats-grid" style="margin-bottom:1.5rem">
        <div class="stat-card"><div class="stat-icon" style="background:rgba(124,58,237,0.15);color:#a78bfa"><i class="ti ti-notes"></i></div><div class="stat-value">${sum.summary?.totalNotes||0}</div><div class="stat-label">Total Notes</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(255,165,2,0.1);color:var(--warning)"><i class="ti ti-archive"></i></div><div class="stat-value">${sum.summary?.archivedNotes||0}</div><div class="stat-label">Archived</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(255,71,87,0.1);color:var(--danger)"><i class="ti ti-trash"></i></div><div class="stat-value">${sum.summary?.deletedNotes||0}</div><div class="stat-label">Deleted</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(0,212,255,0.1);color:var(--accent)"><i class="ti ti-category"></i></div><div class="stat-value">${sum.summary?.totalCategories||0}</div><div class="stat-label">Categories</div></div>
      </div>
      <div class="analytics-grid">
        <div class="analytics-card">
          <h4><i class="ti ti-chart-bar"></i> Notes by Category</h4>
          ${cat.data?.length ? cat.data.map(d=>`
            <div class="bar-item">
              <div class="bar-label"><span>${d.category}</span><span>${d.count}</span></div>
              <div class="bar-track"><div class="bar-fill" style="width:${(d.count/maxCat)*100}%"></div></div>
            </div>`).join('') : '<p style="color:var(--text2);font-size:13px">No data yet</p>'}
        </div>
        <div class="analytics-card">
          <h4><i class="ti ti-calendar"></i> Notes by Month</h4>
          ${mon.data?.length ? mon.data.map(d=>`
            <div class="month-item">
              <span>${MONTHS[d.month]} ${d.year}</span>
              <span class="month-count">${d.count} notes</span>
            </div>`).join('') : '<p style="color:var(--text2);font-size:13px">No data yet</p>'}
        </div>
      </div>`;
  } catch(e) {
    content.innerHTML = '<div class="empty-state"><i class="ti ti-wifi-off"></i><h3>Could not load analytics</h3></div>';
  }
}

function openNoteModal() {
  editingNoteId = null;
  document.getElementById('modal-title').textContent = 'New Note';
  document.getElementById('note-title').value = '';
  document.getElementById('note-content').value = '';
  document.getElementById('note-category').value = 'general';
  document.getElementById('note-tags').value = '';
  document.getElementById('modal-alert').classList.add('hidden');
  document.getElementById('save-note-btn').innerHTML = '<i class="ti ti-device-floppy"></i> Save Note';
  document.getElementById('note-modal').classList.remove('hidden');
}

function openEditModal(id) {
  const note = allNotes.find(n => n._id === id);
  if (!note) return;
  editingNoteId = id;
  document.getElementById('modal-title').textContent = 'Edit Note';
  document.getElementById('note-title').value = note.title;
  document.getElementById('note-content').value = note.content;
  document.getElementById('note-category').value = note.category;
  document.getElementById('note-tags').value = note.tags?.join(', ') || '';
  document.getElementById('modal-alert').classList.add('hidden');
  document.getElementById('save-note-btn').innerHTML = '<i class="ti ti-device-floppy"></i> Update Note';
  document.getElementById('note-modal').classList.remove('hidden');
}

function closeNoteModal() { document.getElementById('note-modal').classList.add('hidden'); }

async function saveNote() {
  const title = document.getElementById('note-title').value.trim();
  const content = document.getElementById('note-content').value.trim();
  const category = document.getElementById('note-category').value;
  const tags = document.getElementById('note-tags').value ? document.getElementById('note-tags').value.split(',').map(t=>t.trim()).filter(Boolean) : [];
  if (!title || !content) return showModalAlert('Title and content are required.', 'error');
  const url = editingNoteId ? `${API}/notes/${editingNoteId}` : `${API}/notes`;
  const method = editingNoteId ? 'PUT' : 'POST';
  setLoading('save-note-btn', true, '');
  try {
    const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify({ title, content, category, tags }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    closeNoteModal();
    showToast(editingNoteId ? '✨ Note updated!' : '🚀 Note created!');
    loadNotes(); showView('notes');
  } catch(e) { showModalAlert(e.message, 'error'); }
  finally { setLoading('save-note-btn', false, '<i class="ti ti-device-floppy"></i> Save Note'); }
}

async function toggleArchive(id) {
  try {
    const res = await fetch(`${API}/notes/${id}/archive`, { method: 'PUT', headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    showToast(data.message);
    if (currentView === 'notes') loadNotes();
    else if (currentView === 'archived') loadArchived();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  try {
    const res = await fetch(`${API}/notes/${id}`, { method: 'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    showToast('🗑️ Note deleted'); loadNotes();
  } catch(e) { showToast(e.message, 'error'); }
}

if (token) {
  fetch(`${API}/auth/profile`, { headers: { Authorization: `Bearer ${token}` } })
    .then(r => r.json())
    .then(d => { if (d.success) initApp(d.user); else localStorage.removeItem('notes_token'); })
    .catch(() => {});
}
</script>
</body>
</html>
